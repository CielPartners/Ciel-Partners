<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciel Partners | 福祉コンサル・医療DX</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 0; color: #3c4043; background: #fff; }
        
        /* ヘッダー */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 4%; border-bottom: 1px solid #eee; }
        .logo img { height: 50px; width: auto; }
        nav ul { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #3c4043; font-size: 0.9rem; font-weight: 500; }

        /* バナー：バグの温床となるCSS背景設定を廃止 */
        .hero-banner { width: 100%; display: block; margin: 0; padding: 0; }
        .hero-banner img { width: 100%; height: auto; display: block; }

        /* コンテンツ */
        .container { max-width: 1000px; margin: 0 auto; padding: 50px 5%; }
        .section-title { text-align: center; color: #005CAF; font-size: 2rem; margin-bottom: 50px; }

        .service-block { display: flex; align-items: flex-start; gap: 30px; margin-bottom: 60px; }
        .service-img { flex: 0 0 45%; }
        .service-img img { width: 100%; height: auto; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .service-text { flex: 1; }
        .service-text h3 { font-size: 1.5rem; color: #005CAF; margin-top: 0; border-left: 5px solid #005CAF; padding-left: 15px; }

        .news-section { background: #f8f9fa; padding: 60px 5%; text-align: center; }
        .news-card { background: #fff; padding: 25px; border: 1px solid #ddd; max-width: 450px; margin: 20px auto; text-align: left; }
        .news-card img { width: 100%; height: auto; }

        footer { background: #202124; color: #fff; text-align: center; padding: 30px; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .service-block { flex-direction: column; }
            .service-img { flex: 0 0 100%; }
            nav { display: none; }
        }
    </style>
</head>
<body>

<header>

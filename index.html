<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciel Partners</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ぐちゃぐちゃの原因となる複雑なCSSを全て排除 */
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 0; color: #333; line-height: 1.6; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 4%; border-bottom: 1px solid #eee; }
        .logo img { height: 50px; width: auto; }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; }
        nav a { text-decoration: none; color: #333; font-size: 14px; }

        /* メイン画像：文字は重ねず、画像だけを正しく表示 */
        .hero { width: 100%; }
        .hero img { width: 100%; height: auto; display: block; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 5%; }
        h2 { text-align: center; color: #005CAF; margin-bottom: 40px; }

        /* 事業内容：左に画像、右にテキストの初期レイアウト */
        .service { display: flex; gap: 30px; margin-bottom: 50px; align-items: flex-start; }
        .service-img { flex: 1; }
        .service-img img { width: 100%; border-radius: 4px; }
        .service-text { flex: 1; }
        .service-text h3 { color: #005CAF; margin-top: 0; }

        footer { background: #f4f4f4; text-align: center; padding: 30px; font-size: 12px; }

        @media (max-width: 768px) {
            .service { flex-direction: column; }
            nav { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="Ciel-pロゴ透明.png" alt="Ciel Partners"></div>
    <nav>
        <ul>
            <li><a href="哲学.html">哲学</a></li>
            <li><a href="プロフィール.html">プロフィール</a></li>
            <li><a href="ニュース.html">ニュース</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="hero">
        <img src="トップ.png" alt="Main Visual">
    </div>

    <div class="container">
        <h2>事業内容</h2>
        <div class="service">
            <div class="service-img"><img src="1on1画像a.png" alt="DX"></div>
            <div class="service-text">
                <h3>DX推進支援・業務改善コンサルティング</h3>
                <p>介護・医療現場の課題に合わせ、ICTツールの選定から導入、運用定着までを伴走支援します。</p>
            </div>
        </div>
        <div class="service">
            <div class="service-img"><img src="1on1画像a.png" alt="1on1"></div>
            <div class="service-text">
                <h3>1on1ミーティング導入・定着支援</h3>
                <p>職員一人ひとりと向き合う対話の場を仕組み化し、離職防止や組織の活性化を支援します。</p>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 Ciel Partners</p>
</footer>

</body>
</html>

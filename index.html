<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciel Partners</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 0; color: #333; line-height: 1.6; }
        
        /* ヘッダー：シンプルにロゴとナビ */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; border-bottom: 1px solid #eee; }
        .logo img { height: 50px; width: auto; }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; }
        nav a { text-decoration: none; color: #333; font-size: 0.9rem; }

        /* メイン画像：画面いっぱいに表示 */
        .hero { width: 100%; margin: 0; }
        .hero img { width: 100%; height: auto; display: block; }

        /* コンテンツエリア */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 5%; }
        h2.section-title { text-align: center; color: #005CAF; margin-bottom: 40px; }

        /* 事業内容：画像と文字を分ける */
        .service { display: flex; gap: 30px; margin-bottom: 50px; align-items: center; }
        .service-img { flex: 1; }
        .service-img img { width: 100%; border-radius: 8px; }
        .service-text { flex: 1; }
        .service-text h3 { color: #005CAF; margin-top: 0; }

        /* フッター */
        footer { background: #f8f9fa; text-align: center; padding: 30px; border-top: 1px solid #eee; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .service { flex-direction: column; }
            nav { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="Ciel-pロゴ透明.png" alt="Logo"></div>
    <nav>
        <ul>
            <li><a href="哲学.html">哲学</a></li>
            <li><a href="プロフィール.html">プロフィール</a></li>
            <li><a href="ニュース.html">ニュース</a></li>
            <li><a href="よくある質問.html">Q&A</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="hero">
        <img src="トップ.png" alt="Main Banner">
    </div>

    <div class="container">
        <h2 class="section-title">事業内容</h2>

        <div class="service">
            <div class="service-img"><img src="1on1画像a.png" alt="DX"></div>
            <div class="service-text">
                <h3>DX推進支援・業務改善</h3>
                <p>現場の課題に合わせたICTツールの導入と運用を支援します。</p>
            </div>
        </div>

        <div class="service">
            <div class="service-img"><img src="1on1画像a.png" alt="1on1"></div>
            <div class="service-text">
                <h3>1on1ミーティング導入支援</h3>
                <p>対話を通じて組織の活性化と離職防止を実現します。</p>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 Ciel Partners</p>
</footer>

</body>
</html>

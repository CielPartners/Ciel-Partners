        <div class="question"><span>Q.</span> どのような施設が対象ですか？</div>
        <div class="answer">医療機関（病院・クリニック）、介護事業所、障害福祉サービス事業所など、福祉・医療全般に対応しております。</div>
    </div>

        <div class="question"><span>Q.</span> コンサルティングの期間はどのくらいですか？</div>
        <div class="answer">課題によりますが、スポット（1回）から、半年〜1年程度の継続的な伴走支援まで柔軟に対応可能です。</div>

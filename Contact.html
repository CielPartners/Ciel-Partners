<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせ | Ciel Partners</title>
    <style>
        /* 提供テキストのデザインを適用 */
        body { font-family: sans-serif; background: #f8fbfe; padding: 20px; }
        .form-container { max-width: 650px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 15px; border-top: 5px solid #00529b; box-shadow: 0 10px 30px rgba(0,82,155,0.1); }
        .form-header { text-align: center; margin-bottom: 30px; color: #00529b; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #00529b; }
        .required { background: #ff4d4d; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 3px; margin-left: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #d1d9e0; border-radius: 6px; box-sizing: border-box; }
        .btn-submit { background: linear-gradient(135deg, #00529b 0%, #00a0e9 100%); color: #fff; border: none; padding: 16px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header"><h2>無料相談・お問い合わせ</h2></div>
    <form id="contact-form">
        <div class="form-group"><label>法人名・施設名<span class="required">必須</span></label><input type="text" name="company" required></div>
        <div class="form-group"><label>お名前<span class="required">必須</span></label><input type="text" name="name" required></div>
        <div class="form-group"><label>メールアドレス<span class="required">必須</span></label><input type="email" name="email" required></div>
        <div class="form-group"><label>お問い合わせ内容<span class="required">必須</span></label><textarea name="message" required rows="5"></textarea></div>
        <button type="submit" id="submit-btn" class="btn-submit">内容を確認して送信する</button>
        <div id="message" style="display:none; text-align:center; margin-top:20px;"></div>
    </form>
</div>
<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbyQHojUPk5MmuHThZiuNGLb7IfLh8bIuEqvRt1ObR8hyNa5TLo0MvG_f52x80EZmRp_/exec";
    const form = document.getElementById('contact-form');
    form.addEventListener("submit", function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.innerText = "送信中...";
        fetch(scriptUrl, { method: "POST", body: new FormData(form), mode: "no-cors" })
        .then(() => {
            document.getElementById('message').style.display = "block";
            document.getElementById('message').innerText = "送信が完了しました。";
            form.reset();
            btn.style.display = "none";
        });
    });
</script>
</body>
</html>

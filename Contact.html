<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせ | Ciel Partners</title>
    <style>
        body { font-family: sans-serif; background: #f8fbfe; padding: 40px; }
        .form-container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; border-top: 5px solid #00529b; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; color: #00529b; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background: #00529b; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>無料相談・お問い合わせ</h2>
        <form id="contact-form">
            <div class="form-group"><label>法人名・施設名</label><input type="text" name="company" class="form-control" required></div>
            <div class="form-group"><label>お名前</label><input type="text" name="name" class="form-control" required></div>
            <div class="form-group"><label>メールアドレス</label><input type="email" name="email" class="form-control" required></div>
            <div class="form-group">
                <label>相談内容</label>
                <input type="checkbox" name="type" value="DXコンサル"> 医療・介護DXコンサル
                <input type="checkbox" name="type" value="離職防止"> 離職防止支援
            </div>
            <div class="form-group"><label>詳細内容</label><textarea name="message" class="form-control" rows="5"></textarea></div>
            <button type="submit" id="submit-btn" class="btn-submit">内容を確認して送信する</button>
            <div id="message" style="display:none; margin-top:20px; color:#00529b; font-weight:bold;"></div>
        </form>
    </div>
    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbyQHojUPk5MmuHThZiuNGLb7IfLh8bIuEqvRt1ObR8hyNa5TLo0MvG_f52x80EZmRp_/exec"; [cite: 32]
        const form = document.getElementById('contact-form');
        form.addEventListener("submit", function(e) {
            e.preventDefault();
            document.getElementById('submit-btn').innerText = "送信中...";
            fetch(scriptUrl, { method: "POST", body: new FormData(form), mode: "no-cors" })
            .then(() => {
                document.getElementById('message').style.display = "block";
                document.getElementById('message').innerText = "送信が完了しました。";
                form.reset();
            });
        });
    </script>
</body>
</html>

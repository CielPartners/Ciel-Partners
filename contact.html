<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CONTACT | Ciel Partners</title>
    <style>
        body { font-family: sans-serif; margin: 0; line-height: 1.8; color: #333; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; border-bottom: 1px solid #eee; background: #fff; position: sticky; top: 0; z-index: 1000; }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #333; font-weight: bold; font-size: 0.9rem; }
        .container { max-width: 600px; margin: 60px auto; padding: 40px; border: 1px solid #eee; border-radius: 15px; }
        label { display: block; margin-top: 20px; font-weight: bold; color: #005CAF; }
        input[type="text"], input[type="email"], input[type="tel"], textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .checkbox-group { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
        .checkbox-item { display: flex; align-items: center; cursor: pointer; }
        .checkbox-item input[type="checkbox"] { width: auto; margin: 0 10px 0 0; cursor: pointer; }
        button { background: #005CAF; color: #fff; padding: 15px; border: none; border-radius: 5px; cursor: pointer; display: block; margin: 30px auto; width: 100%; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        footer { background: #1a1a1a; color: #fff; text-align: center; padding: 40px; }
        #msg { text-align: center; display: none; padding: 20px; color: #005CAF; font-weight: bold; background: #f0f5ff; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
<header>
    <img src="Ciel-pロゴ透明.png" height="50">
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="service.html">SERVICE</a></li>
            <li><a href="news.html">TOPICS</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="contact.html">CONTACT</a></li>
            <li><a href="policy.html">POLICY</a></li>
        </ul>
    </nav>
</header>
<main class="container">
    <h2 style="text-align:center;color:#005CAF;">お問い合わせ</h2>
    <div id="msg"></div>
    
    <form id="contactForm">
        <label>貴施設・法人名</label><input type="text" name="company">
        <label>お名前（必須）</label><input type="text" name="name" required>
        <label>メールアドレス（必須）</label><input type="email" name="email" required>
        <label>電話番号</label><input type="tel" name="tel">
        <label>相談種別（複数選択可）</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="type" value="DX"> <span>DX・業務改善について</span></label>
            <label class="checkbox-item"><input type="checkbox" name="type" value="1on1"> <span>1on1・離職防止について</span></label>
            <label class="checkbox-item"><input type="checkbox" name="type" value="研修"> <span>研修・セミナー依頼</span></label>
        </div>
        <label>内容（必須）</label><textarea name="message" rows="6" required></textarea>
        <div style="text-align:center;margin-top:20px;">
            <input type="checkbox" required id="p-check"><label for="p-check"> プライバシーポリシーに同意する</label>
        </div>
        <button type="submit" id="submitBtn">送信する</button>
    </form>
</main>
<footer>&copy; 2026 Ciel Partners</footer>

<script>
    // GASのURL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyQHojUPk5MmuHThZiuNGLb7IfLh8bIuEqvRt1ObR8hyNa5TLo0MvG_f52x80EZmRp_/exec";
    
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msgDiv = document.getElementById('msg');
        
        // 送信中の状態を作る
        btn.disabled = true;
        btn.innerText = "送信中...";

        const formData = new FormData(this);
        const params = new URLSearchParams();
        formData.forEach((value, key) => params.append(key, value));

        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // セキュリティ制限回避
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        }).then(() => {
            // 送信完了後の表示
            msgDiv.innerText = "お問い合わせありがとうございました。送信が完了しました。";
            msgDiv.style.display = "block";
            this.style.display = "none"; // フォームを隠す
            window.scrollTo(0,0);
        }).catch((err) => {
            console.error(err);
            alert("送信に失敗しました。もう一度お試しください。");
            btn.disabled = false;
            btn.innerText = "送信する";
        });
    });
</script>
</body>
</html>

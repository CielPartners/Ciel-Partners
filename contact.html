<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>CONTACT | Ciel Partners</title>
<style>body{font-family:sans-serif;margin:0;line-height:1.8;}.container{max-width:600px;margin:60px auto;padding:40px;border:1px solid #eee;border-radius:15px;}label{display:block;margin-top:20px;font-weight:bold;color:#005CAF;}input,textarea,select{width:100%;padding:10px;margin-top:5px;border:1px solid #ddd;border-radius:5px;}button{background:#005CAF;color:#fff;padding:15px;border:none;border-radius:5px;cursor:pointer;display:block;margin:30px auto;width:100%;font-weight:bold;}footer{background:#1a1a1a;color:#fff;text-align:center;padding:40px;}</style></head>
<body>
<header style="padding:15px 5%;border-bottom:1px solid #eee;"><img src="Ciel-pロゴ透明.png" height="50"></header>
<main class="container">
    <h2 style="text-align:center;color:#005CAF;">お問い合わせ</h2>
    <form>
        <label>貴施設・法人名</label><input type="text">
        <label>お名前（必須）</label><input type="text" required>
        <label>メールアドレス（必須）</label><input type="email" required>
        <label>電話番号</label><input type="tel">
        <label>相談種別</label><select><option>DX・業務改善について</option><option>1on1・離職防止について</option><option>その他</option></select>
        <label>内容（必須）</label><textarea rows="6" required></textarea>
        <div style="text-align:center;margin-top:20px;"><input type="checkbox" id="a" required style="width:auto;"><label for="a" style="display:inline;color:#333;margin-left:5px;">プライバシーポリシーに同意する</label></div>
        <button type="submit">送信内容を確認する</button>
    </form>
</main>
<footer>&copy; 2026 Ciel Partners</footer>
</body>
</html>

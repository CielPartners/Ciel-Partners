<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | Ciel Partners</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-blue: #005CAF; }
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; line-height: 1.8; color: #333; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo img { height: 50px; }
        nav ul { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #333; font-weight: 500; font-size: 0.85rem; }
        .container { max-width: 700px; margin: 60px auto; padding: 0 5%; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--main-blue); color: #fff; padding: 15px 40px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; display: block; margin: 30px auto; width: 200px; }
        footer { background: #1a1a1a; color: #fff; text-align: center; padding: 30px; font-size: 0.8rem; margin-top: 80px; }
    </style>
</head>
<body>
<header>
    <div class="logo"><img src="Ciel-pロゴ透明.png" alt="Ciel Partners"></div>
    <nav>
        <ul>
            <li><a href="index.html">home</a></li>
            <li><a href="about.html">Ciel Partnersについて</a></li>
            <li><a href="service.html">サービス</a></li>
            <li><a href="news.html">ニュース</a></li>
            <li><a href="faq.html">よくある質問</a></li>
            <li><a href="contact.html">お問い合わせ</a></li>
            <li><a href="policy.html">ポリシー</a></li>
        </ul>
    </nav>
</header>
<main class="container">
    <h2 style="text-align:center; color:var(--main-blue); margin-bottom:40px;">CONTACT</h2>
    <form action="https://formspree.io/f/YOUR_ID" method="POST">
        <div class="form-group"><label>お名前</label><input type="text" name="name" required></div>
        <div class="form-group"><label>メールアドレス</label><input type="email" name="email" required></div>
        <div class="form-group"><label>お問い合わせ内容</label><textarea name="message" rows="6" required></textarea></div>
        <button type="submit">送信する</button>
    </form>
</main>
<footer>&copy; 2026 Ciel Partners All Rights Reserved.</footer>
</body>

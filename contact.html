<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせ | Ciel Partners</title>
    <style>
        :root { --primary: #00529b; }
        body { font-family: sans-serif; margin: 0; background: #f8fbfe; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: #fff; }
        nav ul { list-style: none; display: flex; gap: 20px; }
        .form-container { max-width: 650px; margin: 50px auto; background: #fff; padding: 40px; border-radius: 15px; border-top: 5px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; color: var(--primary); margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #d1d9e0; border-radius: 6px; box-sizing: border-box; }
        .btn-submit { background: linear-gradient(135deg, #00529b 0%, #00a0e9 100%); color: #fff; border: none; padding: 16px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<header>
    <div class="logo"><img src="Ciel-pロゴ透明.png" height="50"></div>
    <nav><ul><li><a href="index.html">home</a></li><li><a href="contact.html">お問い合わせ</a></li></ul></nav>
</header>
<div class="form-container">
    <h2 style="text-align:center; color:var(--primary);">Contact</h2>
    <form id="contact-form">
        <div class="form-group"><label>法人名・施設名</label><input type="text" name="company" required></div>
        <div class="form-group"><label>お名前</label><input type="text" name="name" required></div>
        <div class="form-group"><label>メールアドレス</label><input type="email" name="email" required></div>
        <div class="form-group"><label>お問い合わせ内容</label><textarea name="message" rows="5" required></textarea></div>
        <button type="submit" id="submit-btn" class="btn-submit">内容を確認して送信する</button>
        <p id="result" style="display:none; text-align:center; margin-top:20px; color:var(--primary); font-weight:bold;">送信が完了しました。</p>
    </form>
</div>
<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbyQHojUPk5MmuHThZiuNGLb7IfLh8bIuEqvRt1ObR8hyNa5TLo0MvG_f52x80EZmRp_/exec";
    document.getElementById('contact-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.innerText = "送信中...";
        fetch(scriptUrl, { method: "POST", body: new FormData(this), mode: "no-cors" })
        .then(() => {
            document.getElementById('result').style.display = 'block';
            this.reset();
            btn.style.display = 'none';
        });
    });
</script>
</body>
</html>
